<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Registro Horas V6.4 - Bolsa Corregida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--ios-bg); margin: 0; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }
        .header-sticky { position: sticky; top: 0; z-index: 100; background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding-top: env(safe-area-inset-top); border-bottom: 0.5px solid #d1d1d6; }
        .ios-card { background: white; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); overflow: hidden; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th { background: #fbfbfd; color: #8e8e93; font-size: 7px; text-transform: uppercase; padding: 8px 0; text-align: center; font-weight: 700; border-bottom: 0.5px solid #e5e5ea; }
        td { border-bottom: 0.5px solid #e5e5ea; text-align: center; vertical-align: middle; position: relative; padding: 5px 0; }
        input { width: 100%; border: none; background: transparent; text-align: center; font-size: 13px; outline: none; font-variant-numeric: tabular-nums; }
        .col-dia { width: 12%; } .col-data { width: 17%; } .col-total { width: 15%; } .col-obj { width: 16%; } .col-extra { width: 15%; }
        .weekend { background-color: #f9f9fb; }
        .today-row { background-color: #fff9c4 !important; }
        .tipo-tag { font-size: 7px; font-weight: 900; color: #007aff; display: block; margin-top: -1px; }
        .has-note::after { content: ''; position: absolute; top: 4px; left: 4px; width: 4px; height: 4px; background: #ff9500; border-radius: 50%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .jornada-especial { color: #ff3b30 !important; }
    </style>
</head>
<body class="pb-20">

    <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-[200] hidden items-center justify-center p-6 backdrop-blur-sm" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl border border-gray-100 text-center">
            <h3 id="modal-date" class="text-lg font-bold mb-4 text-blue-600"></h3>
            <div class="mb-4 text-left">
                <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Tipo de Jornada</label>
                <select id="modal-tipo" class="w-full p-3 bg-gray-50 border-none rounded-xl text-sm font-bold appearance-none">
                    <option value="C">Jornada Completa</option>
                    <option value="P">Jornada Partida</option>
                </select>
            </div>
            <div class="mb-5 text-left">
                <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Nota o Incidencia</label>
                <textarea id="modal-text" class="w-full h-24 p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm outline-none" placeholder="Escribe aquí..."></textarea>
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 p-3 text-sm font-bold text-gray-400">Cerrar</button>
                <button onclick="saveModalData()" class="flex-1 p-3 text-sm font-bold bg-black text-white rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="header-sticky px-2">
            <div class="flex justify-between items-center pt-5 pb-1">
                <h1 class="text-lg font-bold tracking-tight">Registro</h1>
                <div class="flex gap-1">
                    <button onclick="setGlobalObjective()" class="bg-blue-50 text-blue-600 px-2 py-1.5 rounded-lg text-[9px] font-bold border border-blue-100 uppercase">Obj. Anual</button>
                    <select id="year-selector" class="bg-gray-200 px-1 py-1 rounded font-bold text-xs" onchange="changeYear(this.value)"></select>
                </div>
            </div>
            
            <div id="month-tabs" class="flex overflow-x-auto gap-1 py-1 no-scrollbar mb-1"></div>
            
            <div class="grid grid-cols-5 gap-1 py-1 text-center">
                <div class="ios-card p-1.5"><p class="text-[6px] font-bold text-gray-400 uppercase">Días</p><p id="stat-days" class="text-[11px] font-bold">0</p></div>
                <div class="ios-card p-1.5 border-l-2 border-blue-200"><p class="text-[6px] font-bold text-gray-400 uppercase">Extras</p><p id="stat-extra-raw" class="text-[11px] font-bold">0:00</p></div>
                <div class="ios-card p-1.5 bg-blue-50/30"><p class="text-[6px] font-bold text-blue-600 uppercase">Conv. Ext</p><p id="stat-conv" class="text-[11px] font-bold text-blue-700">0:00</p></div>
                <div class="ios-card p-1.5 bg-indigo-50/50"><p class="text-[6px] font-bold text-indigo-500 uppercase">Noct.</p><p id="stat-noc" class="text-[11px] font-bold text-indigo-700">0:00</p></div>
                <div class="ios-card p-1.5 bg-[#1c1c1e] text-white"><p class="text-[6px] font-bold text-gray-400 uppercase">Suma Total</p><p id="stat-total" class="text-[11px] font-bold">0:00</p></div>
            </div>

            <div class="ios-card rounded-b-none border-b-0 shadow-none mt-2">
                <table>
                    <thead>
                        <tr><th class="col-dia">Día</th><th class="col-data">Entrada</th><th class="col-data">Salida</th><th class="col-total text-blue-600">Total</th><th class="col-obj">Objetivo</th><th class="col-extra">Extras</th></tr>
                    </thead>
                </table>
            </div>
        </div>

        <div class="px-2">
            <div class="ios-card rounded-t-none border-t-0 mb-4">
                <table id="main-table">
                    <colgroup><col class="col-dia"><col class="col-data"><col class="col-data"><col class="col-total"><col class="col-obj"><col class="col-extra"></colgroup>
                    <tbody id="table-body" class="text-xs"></tbody>
                </table>
            </div>

            <div class="ios-card p-4 mb-4 border-2 border-indigo-100 bg-indigo-50/20">
                <h2 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest mb-3">Bolsa Acumulada (Suma Totales)</h2>
                <div class="grid grid-cols-3 gap-2 text-center mb-3">
                    <div>
                        <p class="text-[7px] text-gray-400 font-bold uppercase">Suma de Totales</p>
                        <p id="bag-total-extras" class="text-xs font-bold">0:00</p>
                    </div>
                    <div>
                        <p class="text-[7px] text-red-400 font-bold uppercase">Restado</p>
                        <p id="bag-subtracted" class="text-xs font-bold text-red-500 cursor-pointer" onclick="editManualSubtraction()">0:00</p>
                    </div>
                    <div>
                        <p class="text-[7px] text-indigo-600 font-bold uppercase">Saldo Neto</p>
                        <p id="bag-balance" class="text-xs font-black text-indigo-700">0:00</p>
                    </div>
                </div>
                <div class="bg-white/60 rounded-lg p-2 text-center border border-indigo-50">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Equivale aproximadamente a:</p>
                    <p id="bag-days-eq" class="text-sm font-black text-indigo-800">0 días libres</p>
                </div>
            </div>

            <div class="flex flex-col gap-2 mb-10">
                <button onclick="exportToCSV()" class="w-full bg-white border border-gray-200 p-4 rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-sm">Exportar a Excel</button>
                <div class="flex gap-2">
                    <button onclick="downloadJSON()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Copia Seguridad</button>
                    <button onclick="document.getElementById('file-input').click()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Restaurar</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" accept=".json">

    <script>
        const CONFIG_PERIODOS = {
            2026: [
                { start: "2026-01-01", end: "2026-01-25" },
                { start: "2026-01-26", end: "2026-02-22" },
                { start: "2026-02-23", end: "2026-03-29" },
                { start: "2026-03-30", end: "2026-04-26" },
                { start: "2026-04-27", end: "2026-05-24" },
                { start: "2026-05-25", end: "2026-06-21" },
                { start: "2026-06-22", end: "2026-07-26" },
                { start: "2026-07-27", end: "2026-08-23" },
                { start: "2026-08-24", end: "2026-09-27" },
                { start: "2026-09-28", end: "2026-10-25" },
                { start: "2026-10-26", end: "2026-11-22" },
                { start: "2026-11-23", end: "2026-12-27" }
            ]
        };

        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const daysShort = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];
        
        let currentYear = 2026;
        let currentMonthIdx = new Date().getMonth();
        let data = JSON.parse(localStorage.getItem('horas_multiy_v1')) || {};
        let manualSubtraction = parseFloat(localStorage.getItem('horas_manual_sub')) || 0;
        let activeKey = null;

        function tToD(t) {
            if(!t) return 0;
            let clean = t.toString().replace(',', '.').replace('.', ':').trim();
            if(!clean.includes(':')) {
                if(clean.length <= 2) clean += ":00";
                else clean = clean.slice(0,-2) + ":" + clean.slice(-2);
            }
            const [h, m] = clean.split(':').map(Number);
            return (h || 0) + ((m || 0)/60);
        }

        function dToC(n) {
            const s = n < -0.001 ? '-' : '';
            const a = Math.abs(n);
            const h = Math.floor(a), m = Math.round((a - h) * 60);
            return `${s}${h}:${m.toString().padStart(2, '0')}`;
        }

        function calcNightBonus(s, e) {
            if(!s || !e) return 0;
            let start = tToD(s), end = tToD(e), nightHours = 0;
            if(end < start) end += 24;
            for(let h = start; h < end; h += 0.05) {
                let hour = h % 24;
                if(hour >= 22 || hour < 6) nightHours += 0.05;
            }
            return nightHours * 0.25; 
        }

        function renderTable(shouldScroll = false) {
            const body = document.getElementById('table-body'); body.innerHTML = "";
            let startDate, endDate;

            if (CONFIG_PERIODOS[currentYear] && CONFIG_PERIODOS[currentYear][currentMonthIdx]) {
                startDate = new Date(CONFIG_PERIODOS[currentYear][currentMonthIdx].start);
                endDate = new Date(CONFIG_PERIODOS[currentYear][currentMonthIdx].end);
            } else {
                startDate = new Date(currentYear, currentMonthIdx, 1);
                endDate = new Date(currentYear, currentMonthIdx + 1, 0);
            }

            const today = new Date();
            const todayStr = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            
            let mExtraRaw = 0, mNocBonus = 0, mDays = 0;

            let iter = new Date(startDate);
            while (iter <= endDate) {
                const d = iter.getDate();
                const m = iter.getMonth() + 1;
                const y = iter.getFullYear();
                const key = `${y}-${m}-${d}`;
                
                const dD = data[key] || { t: 'C', i1:'', o1:'', i2:'', o2:'', obj:'07:36', note:'' };
                const entrada1 = dD.i1 || dD.in || ''; 
                const salida1 = dD.o1 || dD.out || '';

                let worked = 0, bonusNoc = 0;
                if(entrada1 && salida1) {
                    let w1 = tToD(salida1) - tToD(entrada1); if(w1 < 0) w1 += 24;
                    worked += w1; bonusNoc += calcNightBonus(entrada1, salida1);
                }
                if(dD.t === 'P' && dD.i2 && dD.o2) {
                    let w2 = tToD(dD.o2) - tToD(dD.i2); if(w2 < 0) w2 += 24;
                    worked += w2; bonusNoc += calcNightBonus(dD.i2, dD.o2);
                }

                const objVal = tToD(dD.obj || '07:36');
                const diff = worked > 0 ? worked - objVal : 0;
                if(worked > 0) { mDays++; mExtraRaw += diff; mNocBonus += bonusNoc; }

                const row = document.createElement('tr');
                if(key === todayStr) { row.className = "today-row"; row.id = "scroll-target"; }
                if(iter.getDay() === 0 || iter.getDay() === 6) row.classList.add("weekend");

                const isSpecial = worked >= 9.25;

                row.innerHTML = `
                    <td class="col-dia ${dD.note ? 'has-note' : ''}" onclick="openModal('${key}', ${d}, ${m-1})">
                        <div class="text-[6px] font-bold text-gray-400 uppercase">${daysShort[iter.getDay()]} ${m}/${y}</div>
                        <div class="${isSpecial ? 'jornada-especial' : ''} text-[12px] font-bold">${d}</div>
                        <span class="tipo-tag">(${dD.t || 'C'})</span>
                    </td>
                    <td class="col-data">
                        <input type="text" value="${entrada1}" onblur="upd('${key}','i1',this.value)" placeholder="--:--">
                        ${dD.t === 'P' ? `<input type="text" value="${dD.i2||''}" onblur="upd('${key}','i2',this.value)" class="border-t border-gray-100 mt-1">` : ''}
                    </td>
                    <td class="col-data">
                        <input type="text" value="${salida1}" onblur="upd('${key}','o1',this.value)" placeholder="--:--">
                        ${dD.t === 'P' ? `<input type="text" value="${dD.o2||''}" onblur="upd('${key}','o2',this.value)" class="border-t border-gray-100 mt-1">` : ''}
                    </td>
                    <td class="col-total font-semibold text-blue-600">${worked > 0 ? dToC(worked) : '-'}</td>
                    <td class="col-obj"><input type="text" value="${dD.obj||'07:36'}" onblur="upd('${key}','obj',this.value)"></td>
                    <td class="col-extra font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-500'}">${worked > 0 ? (diff>=0?'+':'')+dToC(diff) : ''}</td>
                `;
                body.appendChild(row);
                iter.setDate(iter.getDate() + 1);
            }
            
            document.getElementById('stat-days').innerText = mDays;
            document.getElementById('stat-extra-raw').innerText = dToC(mExtraRaw);
            document.getElementById('stat-conv').innerText = dToC(mExtraRaw * 1.5);
            document.getElementById('stat-noc').innerText = dToC(mNocBonus);
            document.getElementById('stat-total').innerText = dToC((mExtraRaw * 1.5) + mNocBonus);

            updateBagStats();

            if(shouldScroll) {
                setTimeout(() => document.getElementById('scroll-target')?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
            }
        }

        // LÓGICA CORREGIDA: SUMA EL TOTAL PONDERADO DE CADA PERIODO
        function updateBagStats() {
            let totalWeightedAccumulated = 0;
            
            Object.keys(CONFIG_PERIODOS).forEach(year => {
                CONFIG_PERIODOS[year].forEach(period => {
                    let periodExtraRaw = 0;
                    let periodNocBonus = 0;
                    let iter = new Date(period.start);
                    let end = new Date(period.end);
                    
                    while(iter <= end) {
                        const key = `${iter.getFullYear()}-${iter.getMonth() + 1}-${iter.getDate()}`;
                        const day = data[key];
                        if(day) {
                            const ent1 = day.i1 || day.in;
                            const sal1 = day.o1 || day.out;
                            let worked = 0;
                            let noc = 0;
                            if(ent1 && sal1) {
                                let w1 = tToD(sal1) - tToD(ent1); if(w1 < 0) w1 += 24;
                                worked += w1;
                                noc += calcNightBonus(ent1, sal1);
                            }
                            if(day.t === 'P' && day.i2 && day.o2) {
                                let w2 = tToD(day.o2) - tToD(day.i2); if(w2 < 0) w2 += 24;
                                worked += w2;
                                noc += calcNightBonus(day.i2, day.o2);
                            }
                            if(worked > 0) {
                                const obj = tToD(day.obj || '07:36');
                                periodExtraRaw += (worked - obj);
                                periodNocBonus += noc;
                            }
                        }
                        iter.setDate(iter.getDate() + 1);
                    }
                    
                    // REPLICAMOS LA "SUMA TOTAL" DEL MES: (Extras x 1.5) + Nocturnidad
                    let periodTotalWeighted = (periodExtraRaw * 1.5) + periodNocBonus;

                    // Si la suma total del periodo es positiva, se añade a la bolsa
                    if(periodTotalWeighted > 0) {
                        totalWeightedAccumulated += periodTotalWeighted;
                    }
                });
            });

            const netBalance = totalWeightedAccumulated - manualSubtraction;
            const daysEq = netBalance / 7.6; 

            document.getElementById('bag-total-extras').innerText = dToC(totalWeightedAccumulated);
            document.getElementById('bag-subtracted').innerText = dToC(manualSubtraction);
            document.getElementById('bag-balance').innerText = dToC(netBalance);
            document.getElementById('bag-days-eq').innerText = `${daysEq.toFixed(2)} días aprox.`;
        }

        function editManualSubtraction() {
            const val = prompt("Horas a restar de la bolsa (HH:MM o decimal):", dToC(manualSubtraction));
            if (val !== null) {
                manualSubtraction = tToD(val);
                localStorage.setItem('horas_manual_sub', manualSubtraction);
                updateBagStats();
            }
        }

        function upd(k, f, v) {
            if(!data[k]) data[k] = { t: 'C', i1:'', o1:'', i2:'', o2:'', obj:'07:36', note:'' };
            if(f === 'i1') delete data[k].in;
            if(f === 'o1') delete data[k].out;
            data[k][f] = v;
            localStorage.setItem('horas_multiy_v1', JSON.stringify(data));
            renderTable(false);
        }

        function openModal(k, d, mIdx) { 
            activeKey = k; 
            document.getElementById('modal-date').innerText = d + " de " + months[mIdx]; 
            document.getElementById('modal-tipo').value = data[k]?.t || 'C';
            document.getElementById('modal-text').value = data[k]?.note || ""; 
            document.getElementById('modal-overlay').style.display = 'flex'; 
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function saveModalData() {
            if(!data[activeKey]) data[activeKey] = { t: 'C', i1:'', o1:'', i2:'', o2:'', obj:'07:36', note:'' };
            data[activeKey].t = document.getElementById('modal-tipo').value;
            data[activeKey].note = document.getElementById('modal-text').value;
            localStorage.setItem('horas_multiy_v1', JSON.stringify(data));
            closeModal();
            renderTable();
        }

        function setGlobalObjective() {
            const n = prompt("Objetivo Anual (HH:MM):", "07:36");
            if (n) {
                CONFIG_PERIODOS[currentYear].forEach(p => {
                    let iter = new Date(p.start);
                    let end = new Date(p.end);
                    while(iter <= end) {
                        let k = `${iter.getFullYear()}-${iter.getMonth()+1}-${iter.getDate()}`;
                        if(!data[k]) data[k] = { t:'C', i1:'', o1:'', obj:n };
                        else data[k].obj = n;
                        iter.setDate(iter.getDate()+1);
                    }
                });
                localStorage.setItem('horas_multiy_v1', JSON.stringify(data));
                renderTable();
            }
        }

        function changeMonth(i) { currentMonthIdx = i; renderTabs(); renderTable(true); }
        function changeYear(y) { currentYear = parseInt(y); renderTable(true); }
        function renderTabs() {
            document.getElementById('month-tabs').innerHTML = months.map((m, i) => `<button onclick="changeMonth(${i})" class="flex-none px-3 py-2 rounded-full text-[10px] font-bold ${i === currentMonthIdx ? 'bg-black text-white' : 'bg-white text-gray-400 border border-gray-100'}">${m.toUpperCase()}</button>`).join('');
        }

        function downloadJSON() {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: 'application/json'})); a.download = "backup_horas.json"; a.click();
        }

        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                data = JSON.parse(ev.target.result);
                localStorage.setItem('horas_multiy_v1', JSON.stringify(data));
                renderTable(true);
            };
            reader.readAsText(e.target.files[0]);
        };

        function exportToCSV() {
            let csv = "\uFEFFFecha;Entrada;Salida;Real;Objetivo;Diferencia;Nota\n";
            Object.keys(data).sort().forEach(k => {
                const d = data[k];
                const ent = d.i1 || d.in || '';
                const sal = d.o1 || d.out || '';
                if(ent) {
                    let w = tToD(sal) - tToD(ent); if(w < 0) w += 24;
                    csv += `${k};${ent};${sal};${dToC(w)};${d.obj};${dToC(w-tToD(d.obj))};"${d.note||''}"\n`;
                }
            });
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            a.download = `registro_${currentYear}.csv`; a.click();
        }

        window.onload = () => { 
            const sel = document.getElementById('year-selector');
            [2026, 2027, 2028].forEach(y => {
                const opt = document.createElement('option'); opt.value = y; opt.innerText = y;
                if(y === currentYear) opt.selected = true;
                sel.appendChild(opt);
            });
            renderTabs(); renderTable(true); 
        };
    </script>
</body>
</html>
