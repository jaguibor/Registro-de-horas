<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Registro Horas V6.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--ios-bg); margin: 0; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }
        .header-sticky { position: sticky; top: 0; z-index: 100; background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding-top: env(safe-area-inset-top); border-bottom: 0.5px solid #d1d1d6; }
        .ios-card { background: white; border-radius: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); overflow: hidden; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th { background: #fbfbfd; color: #8e8e93; font-size: 7px; text-transform: uppercase; padding: 8px 0; text-align: center; font-weight: 700; border-bottom: 0.5px solid #e5e5ea; }
        td { border-bottom: 0.5px solid #e5e5ea; text-align: center; vertical-align: middle; position: relative; padding: 5px 0; }
        input { width: 100%; border: none; background: transparent; text-align: center; font-size: 13px; outline: none; font-variant-numeric: tabular-nums; }
        .col-dia { width: 12%; } .col-data { width: 17%; } .col-total { width: 15%; } .col-obj { width: 16%; } .col-extra { width: 15%; }
        .weekend { background-color: #f9f9fb; }
        .today-row { background-color: #fff9c4 !important; }
        .tipo-tag { font-size: 7px; font-weight: 900; color: #007aff; display: block; margin-top: -1px; }
        .has-note::after { content: ''; position: absolute; top: 4px; left: 4px; width: 4px; height: 4px; background: #ff9500; border-radius: 50%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .jornada-especial { color: #ff3b30 !important; }
    </style>
</head>
<body class="pb-20">

    <!-- Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-[200] hidden items-center justify-center p-6 backdrop-blur-sm" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl border border-gray-100 text-center">
            <h3 id="modal-date" class="text-lg font-bold mb-4 text-blue-600"></h3>
            <div class="mb-4 text-left">
                <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Tipo de Jornada</label>
                <select id="modal-tipo" class="w-full p-3 bg-gray-50 border-none rounded-xl text-sm font-bold appearance-none">
                    <option value="C">Jornada Completa</option>
                    <option value="P">Jornada Partida</option>
                </select>
            </div>
            <div class="mb-5 text-left">
                <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">Nota o Incidencia</label>
                <textarea id="modal-text" class="w-full h-24 p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm outline-none" placeholder="Escribe aquí..."></textarea>
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 p-3 text-sm font-bold text-gray-400">Cerrar</button>
                <button onclick="saveModalData()" class="flex-1 p-3 text-sm font-bold bg-black text-white rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <!-- Header fijo -->
        <div class="header-sticky px-2">
            <div class="flex justify-between items-center pt-5 pb-1">
                <h1 class="text-lg font-bold tracking-tight">Registro</h1>
                <div class="flex gap-1">
                    <button onclick="setGlobalObjective()" class="bg-blue-50 text-blue-600 px-2 py-1.5 rounded-lg text-[9px] font-bold border border-blue-100 uppercase">Obj. Anual</button>
                    <select id="year-selector" class="bg-gray-200 px-1 py-1 rounded font-bold text-xs" onchange="changeYear(this.value)"></select>
                </div>
            </div>

            <div id="month-tabs" class="flex overflow-x-auto gap-1 py-1 no-scrollbar mb-1"></div>

            <!-- Stats -->
            <div class="grid grid-cols-5 gap-1 py-1 text-center">
                <div class="ios-card p-1.5"><p class="text-[6px] font-bold text-gray-400 uppercase">Días</p><p id="stat-days" class="text-[11px] font-bold">0</p></div>
                <div class="ios-card p-1.5 border-l-2 border-blue-200"><p class="text-[6px] font-bold text-gray-400 uppercase">Extras</p><p id="stat-extra-raw" class="text-[11px] font-bold">0:00</p></div>
                <div class="ios-card p-1.5 bg-blue-50/30"><p class="text-[6px] font-bold text-blue-600 uppercase">Conv. Ext</p><p id="stat-conv" class="text-[11px] font-bold text-blue-700">0:00</p></div>
                <div class="ios-card p-1.5 bg-indigo-50/50"><p class="text-[6px] font-bold text-indigo-500 uppercase">Noct.</p><p id="stat-noc" class="text-[11px] font-bold text-indigo-700">0:00</p></div>
                <div class="ios-card p-1.5 bg-[#1c1c1e] text-white"><p class="text-[6px] font-bold text-gray-400 uppercase">Suma Total</p><p id="stat-total" class="text-[11px] font-bold">0:00</p></div>
            </div>

            <!-- Cabecera tabla (sticky) -->
            <div class="ios-card rounded-b-none border-b-0 shadow-none mt-2">
                <table>
                    <thead>
                        <tr>
                            <th class="col-dia">Día</th>
                            <th class="col-data">Entrada</th>
                            <th class="col-data">Salida</th>
                            <th class="col-total text-blue-600">Total</th>
                            <th class="col-obj">Objetivo</th>
                            <th class="col-extra">Extras</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>

        <!-- Contenido -->
        <div class="px-2">
            <div class="ios-card rounded-t-none border-t-0 mb-4">
                <table id="main-table">
                    <colgroup>
                        <col class="col-dia"><col class="col-data"><col class="col-data">
                        <col class="col-total"><col class="col-obj"><col class="col-extra">
                    </colgroup>
                    <tbody id="table-body" class="text-xs"></tbody>
                </table>
            </div>

            <!-- Bolsa acumulada -->
            <div class="ios-card p-4 mb-4 border-2 border-indigo-100 bg-indigo-50/20">
                <h2 class="text-[10px] font-black uppercase text-indigo-600 tracking-widest mb-3">Bolsa Acumulada (Suma Totales)</h2>
                <div class="grid grid-cols-3 gap-2 text-center mb-3">
                    <div>
                        <p class="text-[7px] text-gray-400 font-bold uppercase">Suma de Totales</p>
                        <p id="bag-total-extras" class="text-xs font-bold">0:00</p>
                    </div>
                    <div>
                        <p class="text-[7px] text-red-400 font-bold uppercase">Restado</p>
                        <p id="bag-subtracted" class="text-xs font-bold text-red-500 cursor-pointer" onclick="editManualSubtraction()">0:00</p>
                    </div>
                    <div>
                        <p class="text-[7px] text-indigo-600 font-bold uppercase">Saldo Neto</p>
                        <p id="bag-balance" class="text-xs font-black text-indigo-700">0:00</p>
                    </div>
                </div>
                <div class="bg-white/60 rounded-lg p-2 text-center border border-indigo-50">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Equivale aproximadamente a:</p>
                    <p id="bag-days-eq" class="text-sm font-black text-indigo-800">0 días libres</p>
                </div>
            </div>

            <!-- Acciones -->
            <div class="flex flex-col gap-2 mb-10">
                <button onclick="exportToCSV()" class="w-full bg-white border border-gray-200 p-4 rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-sm">Exportar a Excel</button>
                <div class="flex gap-2">
                    <button onclick="downloadJSON()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Copia Seguridad</button>
                    <button onclick="document.getElementById('file-input').click()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Restaurar</button>
                </div>
            </div>
        </div>
    </div>
