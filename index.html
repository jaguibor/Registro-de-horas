<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Horas 26">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2972/2972531.png">
    <link rel="manifest" href="manifest.json">
    
    <title>Registro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--ios-bg); -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
        .ios-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        input[type="text"] { -webkit-appearance: none; background: transparent; text-align: center; font-size: 15px; width: 100%; padding: 8px 0; border: none; font-variant-numeric: tabular-nums; }
        
        /* BLOQUE FIJO SUPERIOR */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--ios-bg); /* Fondo sólido para tapar el scroll */
            padding-bottom: 5px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .glass-header { 
            background: rgba(255, 255, 255, 0.95); 
            border-bottom: 0.5px solid rgba(0,0,0,0.1); 
        }
        
        /* AJUSTES DE COLUMNAS */
        .col-dia { width: 55px; } 
        .col-hora { width: 55px; } 
        .col-real { width: 50px; } 
        .col-obj { width: 45px; } 
        .col-dif { width: 60px; text-align: center; } /* Forzado centro */
        
        .weekend-row { background-color: #F9F9F9; }
        .hidden-view { display: none !important; }
        .tap-effect:active { opacity: 0.6; transform: scale(0.97); transition: transform 0.1s; }
        
        /* Ocultar barra scroll en pestañas */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        header { padding-top: env(safe-area-inset-top); }
        footer { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <header class="px-5 pt-6 pb-2 flex justify-between items-start mt-2 mb-1">
            <div>
                <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Control Horario</h2>
                <h1 class="text-3xl font-bold text-black tracking-tight">2026</h1>
            </div>
            <button id="toggle-view-btn" class="bg-blue-600 text-white font-bold text-[10px] px-4 py-2 rounded-full uppercase tap-effect shadow-blue-200 shadow-md">Resumen</button>
        </header>

        <div id="view-register">
            
            <div class="sticky-wrapper">
                <div class="pt-2 pb-2">
                    <div id="month-tabs" class="flex overflow-x-auto px-5 gap-2 no-scrollbar" style="-webkit-overflow-scrolling: touch;"></div>
                </div>

                <div class="px-3">
                    <div class="grid grid-cols-3 gap-2 mb-2 text-center">
                        <div class="ios-card py-2 px-1 shadow-sm flex flex-col justify-center bg-white border border-gray-100">
                            <span class="block text-[8px] text-gray-400 font-bold uppercase tracking-wider">Días</span>
                            <span id="total-days-worked" class="text-lg font-bold text-gray-800 leading-tight">0</span>
                        </div>
                        <div class="ios-card py-2 px-1 shadow-sm border border-gray-100 flex flex-col justify-center">
                            <span class="block text-[8px] text-gray-400 font-bold uppercase tracking-wider">Dif (1x)</span>
                            <span id="month-diff-real" class="text-lg font-bold text-gray-600 leading-tight">0h</span>
                        </div>
                        <div class="ios-card py-2 px-1 bg-green-50 border border-green-100 shadow-sm flex flex-col justify-center">
                            <span class="block text-[8px] text-green-700 font-bold uppercase tracking-wider">Extra (1.5x)</span>
                            <span id="month-diff-multiplied" class="text-lg font-bold text-green-700 leading-tight">0h</span>
                        </div>
                    </div>

                    <div class="ios-card rounded-b-none border-b-0 border border-gray-200/60 shadow-sm">
                        <table class="w-full text-left border-collapse table-fixed">
                            <thead class="bg-gray-50 text-[9px] uppercase text-gray-500 font-bold border-b border-gray-200">
                                <tr>
                                    <th class="py-3 px-1 col-dia text-center">Día</th>
                                    <th class="py-3 col-hora text-center">Ent.</th>
                                    <th class="py-3 col-hora text-center">Sal.</th>
                                    <th class="py-3 col-real text-center text-blue-600">Real</th>
                                    <th class="py-3 col-obj text-center">Obj.</th>
                                    <th class="py-3 col-dif text-center">Dif.</th> </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="px-3 -mt-1"> <div class="ios-card rounded-t-none border-t-0 border border-gray-200/60 mb-4">
                    <table class="w-full text-left border-collapse table-fixed">
                        <colgroup>
                            <col class="col-dia">
                            <col class="col-hora">
                            <col class="col-hora">
                            <col class="col-real">
                            <col class="col-obj">
                            <col class="col-dif">
                        </colgroup>
                        <tbody id="spreadsheet-body" class="text-[14px]"></tbody>
                    </table>
                </div>

                <div class="ios-card divide-y divide-gray-100 border border-gray-200/60 shadow-sm mb-6">
                    <div class="flex justify-between items-center p-3 text-xs text-gray-500 font-medium">
                        <span>Saldo Inicial Año</span>
                        <input type="text" inputmode="decimal" id="initial-balance-input" class="w-20 text-right font-bold text-blue-600 bg-gray-50 rounded px-2" placeholder="0">
                    </div>
                    <div class="flex justify-between items-center p-4 bg-gray-900 text-white font-bold uppercase tracking-wider">
                        <span>Saldo Total</span>
                        <span id="grand-total" class="text-lg">0h 0m</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-summary" class="hidden-view px-3 pt-2">
            <div class="ios-card border border-gray-200/60 shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-[10px] uppercase text-gray-500 font-bold border-b border-gray-200">
                        <tr><th class="py-3 px-4">Mes</th><th class="py-3 text-center">Días</th><th class="py-3 text-right px-4">Extra (1.5x)</th></tr>
                    </thead>
                    <tbody id="summary-table-body" class="text-sm divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <footer class="mt-4 px-4 flex flex-col gap-3 justify-center items-center pb-8">
            <div class="flex gap-4">
                <button id="download-btn" class="text-white bg-gray-800 px-4 py-2 rounded-lg text-[11px] font-bold uppercase shadow tap-effect">Guardar Backup</button>
                <button id="import-btn" class="text-blue-600 bg-blue-50 px-4 py-2 rounded-lg text-[11px] font-bold uppercase tap-effect">Cargar Backup</button>
            </div>
            <input type="file" id="file-input" class="hidden" accept=".json">
            <button id="reset-button" class="text-red-400 text-[10px] font-bold uppercase mt-2 tap-effect p-2">Reiniciar Datos Mes</button>
        </footer>
    </div>

    <script>
        const currentYear = 2026;
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const dayShortNames = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];
        
        let currentMonth = monthNames[new Date().getMonth()];
        let spreadsheetData = {};

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.error));
        }

        // --- LÓGICA DE TIEMPO INTELIGENTE ---
        function parseTimeInput(str) {
            if (!str) return null;
            // Reemplaza punto y coma por dos puntos para estandarizar
            let clean = str.trim().replace(/[.,]/g, ':');
            
            // Si el usuario escribe "8", asumimos "8:00"
            if (!clean.includes(':')) {
                if(clean.length <= 2) return `${clean}:00`; // "8" -> "8:00"
                if(clean.length === 3) return `${clean[0]}:${clean.slice(1)}`; // "830" -> "8:30"
                if(clean.length === 4) return `${clean.slice(0,2)}:${clean.slice(2)}`; // "0830" -> "08:30"
            }
            
            // Asegurar formato HH:MM (añadir ceros)
            let parts = clean.split(':');
            let h = parts[0] || "0";
            let m = parts[1] || "00";
            if(m.length === 1) m = "0" + m;
            return `${h}:${m}`;
        }

        function timeToDecimal(str) {
            if (!str) return 0;
            // Aceptamos formato decimal directo (7.6) para objetivos
            if (!str.includes(':') && str.includes('.')) return parseFloat(str);
            
            // Parseo estándar HH:MM
            const cleanStr = str.replace(',', '.').replace('.', ':'); // Fallback
            const parts = cleanStr.split(':');
            if (parts.length === 2) {
                return parseInt(parts[0]) + (parseInt(parts[1]) / 60);
            }
            return parseFloat(cleanStr) || 0;
        }

        function decimalToTime(decimal, short = false) {
            const sign = decimal < -0.001 ? '-' : '';
            const abs = Math.abs(decimal);
            const hrs = Math.floor(abs);
            const mins = Math.round((abs - hrs) * 60);
            
            let finalH = hrs;
            let finalM = mins;
            if(finalM === 60) { finalH++; finalM = 0; }
            
            return short 
                ? `${sign}${finalH}:${String(finalM).padStart(2, '0')}` 
                : `${sign}${finalH}h ${String(finalM).padStart(2, '0')}m`;
        }
        // ------------------------------------

        function renderTabs() {
            const container = document.getElementById('month-tabs');
            container.innerHTML = '';
            monthNames.forEach(month => {
                const btn = document.createElement('button');
                const isActive = month === currentMonth;
                btn.textContent = month.substring(0, 3).toUpperCase();
                btn.className = `flex-none px-4 py-2 rounded-full text-[11px] font-bold transition-all tap-effect snap-center ${isActive ? 'bg-black text-white shadow-md' : 'bg-white text-gray-400 border border-gray-200'}`;
                btn.onclick = () => { currentMonth = month; renderTabs(); renderTable(); };
                container.appendChild(btn);
            });
            setTimeout(() => {
                const activeBtn = container.querySelector('.bg-black');
                if(activeBtn) activeBtn.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
            }, 100);
        }

        function renderTable() {
            const tbody = document.getElementById('spreadsheet-body');
            tbody.innerHTML = '';
            const date = new Date(currentYear, monthNames.indexOf(currentMonth), 1);
            
            while (date.getMonth() === monthNames.indexOf(currentMonth)) {
                const key = `${currentYear}-${date.getMonth()+1}-${date.getDate()}`;
                const data = spreadsheetData[key] || {};
                const tr = document.createElement('tr');
                const dayOfWeek = date.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                
                tr.className = `border-b border-gray-50 h-11 ${isWeekend ? 'weekend-row' : ''}`;
                
                tr.innerHTML = `<td class="text-center"><div class="flex flex-col leading-none items-center justify-center"><span class="text-[9px] font-bold ${isWeekend ? 'text-red-400' : 'text-gray-400'} uppercase tracking-tighter">${dayShortNames[dayOfWeek]}</span><span class="text-[13px] font-bold text-gray-700">${date.getDate()}</span></div></td>`;
                
                // INPUTS INTELIGENTES
                ['start', 'end'].forEach(f => {
                    const td = document.createElement('td');
                    const inp = document.createElement('input');
                    inp.type="text"; 
                    inp.inputMode="decimal"; 
                    inp.placeholder = "--.--";
                    inp.value = data[f] || '';
                    inp.className = "text-gray-800 font-medium placeholder-gray-300 focus:bg-blue-50 focus:text-blue-600 rounded transition-colors";
                    
                    // Al perder el foco (blur), formateamos lo que escribió el usuario
                    inp.onblur = (e) => {
                        const raw = e.target.value;
                        if(raw) {
                            const formatted = parseTimeInput(raw); // Convierte "8.15" -> "8:15"
                            e.target.value = formatted;
                            updateData(key, f, formatted);
                        } else {
                            updateData(key, f, "");
                        }
                    };
                    // Enter key también dispara blur
                    inp.onkeydown = (e) => { if(e.key === 'Enter') e.target.blur(); };

                    td.appendChild(inp); tr.appendChild(td);
                });

                tr.innerHTML += `<td class="bg-blue-50/40 font-bold text-center text-blue-700 text-[13px]">${data.worked || '—'}</td>`;
                
                const tdDue = document.createElement('td');
                tdDue.className = "text-center";
                const inpDue = document.createElement('input');
                inpDue.type="text"; inpDue.inputMode="decimal";
                inpDue.value = data.due || '';
                inpDue.placeholder = "7.6";
                inpDue.className = "text-gray-400 text-[12px] text-center";
                inpDue.onchange = (e) => { updateData(key, 'due', e.target.value); };
                tdDue.appendChild(inpDue); tr.appendChild(tdDue);

                const diffVal = timeToDecimal(data.worked) - timeToDecimal(data.due);
                const colorClass = diffVal >= 0 ? 'text-green-600' : 'text-red-500';
                tr.innerHTML += `<td class="text-center px-1 font-bold text-[12px] ${colorClass}">${data.worked ? (diffVal > 0 ? '+' : '') + decimalToTime(diffVal, true) : ''}</td>`;
                
                tbody.appendChild(tr);
                date.setDate(date.getDate() + 1);
            }
            recalculateTotals();
        }

        function updateData(key, field, value) {
            if (!spreadsheetData[key]) spreadsheetData[key] = {};
            spreadsheetData[key][field] = value;
            
            if(spreadsheetData[key].start && spreadsheetData[key].end){
                // Usamos la función robusta timeToDecimal que ya maneja los dos puntos
                const startDec = timeToDecimal(spreadsheetData[key].start);
                const endDec = timeToDecimal(spreadsheetData[key].end);
                
                let diff = endDec - startDec;
                // Si es negativo (ej 23:00 a 06:00), sumamos 24h
                if (diff < 0) diff += 24;
                
                spreadsheetData[key].worked = decimalToTime(diff, true);
                if(!spreadsheetData[key].due) spreadsheetData[key].due = "7.6";
            } else {
                spreadsheetData[key].worked = "";
            }
            saveStorage(); recalculateTotals(); 
            // NO llamamos a renderTable() aquí para evitar perder foco si estamos tabulando
            re-renderRowCalc(key); 
        }

        // Optimización: Solo recalcula totales visuales sin redibujar toda la tabla
        function re-renderRowCalc(key) {
           recalculateTotals();
           // Si quisieras actualizar solo la celda de resultado "Real" y "Dif" al vuelo, sería aquí.
           // Por simplicidad, y como renderTable es rápido, podemos llamar a renderTable si es necesario,
           // pero para evitar saltos de teclado, mejor dejamos que el usuario termine.
           // En este caso, como usamos onblur, es seguro llamar a renderTable.
           renderTable(); 
        }

        function recalculateTotals() {
            let mDiffReal = 0, mDiffWeighted = 0, mDays = 0, totalYearWeighted = 0;
            
            Object.keys(spreadsheetData).forEach(k => {
                if(k === 'initialBalance') return;
                const d = spreadsheetData[k];
                if(d.worked && d.due) {
                    const rawDiff = timeToDecimal(d.worked) - timeToDecimal(d.due);
                    const weightedDiff = rawDiff * 1.5;
                    totalYearWeighted += weightedDiff;
                    
                    if(k.includes(`-${monthNames.indexOf(currentMonth)+1}-`)) {
                        mDays++; mDiffReal += rawDiff; mDiffWeighted += weightedDiff; 
                    }
                }
            });

            document.getElementById('total-days-worked').textContent = mDays;
            document.getElementById('month-diff-real').textContent = (mDiffReal > 0 ? '+' : '') + decimalToTime(mDiffReal, true);
            document.getElementById('month-diff-multiplied').textContent = (mDiffWeighted > 0 ? '+' : '') + decimalToTime(mDiffWeighted, true);
            
            const init = timeToDecimal(spreadsheetData.initialBalance);
            const grandTotal = init + totalYearWeighted;
            document.getElementById('grand-total').textContent = (grandTotal > 0 ? '+' : '') + decimalToTime(grandTotal);
        }

        function saveStorage() { localStorage.setItem('timeTracker_2026_v2', JSON.stringify(spreadsheetData)); }
        function loadStorage() { 
            const saved = localStorage.getItem('timeTracker_2026_v2');
            if(saved) spreadsheetData = JSON.parse(saved);
            document.getElementById('initial-balance-input').value = spreadsheetData.initialBalance || '';
        }

        // ... (Resto de funciones de botones igual que antes)
        document.getElementById('toggle-view-btn').onclick = () => {
            const isReg = !document.getElementById('view-register').classList.toggle('hidden-view');
            document.getElementById('view-summary').classList.toggle('hidden-view');
            document.getElementById('toggle-view-btn').textContent = isReg ? "Resumen" : "Volver";
            if(!isReg) renderSummary();
        };

        function renderSummary() {
            const sBody = document.getElementById('summary-table-body');
            sBody.innerHTML = '';
            monthNames.forEach((m, i) => {
                let md = 0, mdiff = 0;
                Object.keys(spreadsheetData).forEach(k => {
                    const parts = k.split('-');
                    if(parts.length === 3 && parseInt(parts[1]) === i+1) {
                         const d = spreadsheetData[k];
                         if(d.worked && d.due) { md++; mdiff += (timeToDecimal(d.worked) - timeToDecimal(d.due)) * 1.5; }
                    }
                });
                if (md > 0 || m === currentMonth) {
                    const color = mdiff >= 0 ? 'text-green-600' : 'text-red-500';
                    sBody.innerHTML += `<tr><td class="p-4 font-bold text-gray-700">${m}</td><td class="text-center text-gray-500">${md}</td><td class="text-right p-4 font-mono font-bold ${color}">${mdiff === 0 ? '-' : (mdiff > 0 ? '+' : '') + decimalToTime(mdiff, true)}</td></tr>`;
                }
            });
        }

        document.getElementById('download-btn').onclick = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(spreadsheetData));
            const a = document.createElement('a');
            a.href = dataStr; a.download = "backup_horas_" + new Date().toISOString().slice(0,10) + ".json";
            document.body.appendChild(a); a.click(); a.remove();
        };

        const fileInput = document.getElementById('file-input');
        document.getElementById('import-btn').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try { spreadsheetData = JSON.parse(e.target.result); saveStorage(); renderTable(); alert("Datos cargados"); } 
                catch(err) { alert("Error archivo"); }
            };
            reader.readAsText(file);
        };

        document.getElementById('reset-button').onclick = () => {
            if(confirm("¿Borrar mes actual?")) {
               const newObj = {};
               Object.keys(spreadsheetData).forEach(k => {
                   if(k === 'initialBalance' || !k.includes(`-${monthNames.indexOf(currentMonth)+1}-`)) newObj[k] = spreadsheetData[k];
               });
               spreadsheetData = newObj; saveStorage(); renderTable();
            }
        };

        window.onload = () => { loadStorage(); renderTabs(); renderTable(); };
    </script>
</body>
</html>
