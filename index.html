<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Registro de Horas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--ios-bg); margin: 0; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }
        .header-sticky { position: sticky; top: 0; z-index: 100; background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding-top: env(safe-area-inset-top); border-bottom: 0.5px solid #d1d1d6; }
        .ios-card { background: white; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); overflow: hidden; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th { background: #fbfbfd; color: #8e8e93; font-size: 8px; text-transform: uppercase; padding: 10px 0; text-align: center; font-weight: 700; border-bottom: 0.5px solid #e5e5ea; }
        td { border-bottom: 0.5px solid #e5e5ea; text-align: center; vertical-align: middle; position: relative; padding: 4px 0; }
        input { width: 100%; border: none; background: transparent; text-align: center; font-size: 14px; outline: none; font-variant-numeric: tabular-nums; }
        select { background: #f2f2f7; border-radius: 4px; font-size: 10px; font-weight: bold; appearance: none; padding: 2px 4px; text-align: center; }
        .col-dia { width: 14%; } .col-tipo { width: 12%; } .col-data { width: 18%; } .col-res { width: 16%; }
        .weekend { background-color: #f9f9fb; }
        .holiday-text { color: #ff3b30 !important; font-weight: bold; }
        .today-row { background-color: #fff9c4 !important; }
        .has-note::after { content: ''; position: absolute; top: 4px; right: 4px; width: 4px; height: 4px; background: #007aff; border-radius: 50%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .year-select { background: #e5e5ea; border-radius: 8px; padding: 2px 8px; font-size: 14px; font-weight: bold; appearance: none; }
    </style>
</head>
<body class="pb-20">

    <div id="modal-overlay" class="fixed inset-0 bg-black/40 z-[200] hidden items-center justify-center p-6 backdrop-blur-sm" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl">
            <h3 id="modal-date" class="text-lg font-bold mb-4 text-center"></h3>
            <textarea id="modal-text" class="w-full h-32 p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Añadir nota..."></textarea>
            <div class="flex gap-3 mt-5">
                <button onclick="closeModal()" class="flex-1 p-3 text-sm font-bold text-gray-400">Cerrar</button>
                <button onclick="saveNote()" class="flex-1 p-3 text-sm font-bold bg-black text-white rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="header-sticky px-3">
            <div class="flex justify-between items-center pt-5 pb-2">
                <h1 class="text-xl font-bold tracking-tight">Registro</h1>
                <select id="year-selector" class="year-select" onchange="changeYear(this.value)"></select>
            </div>
            <div id="month-tabs" class="flex overflow-x-auto gap-2 py-2 no-scrollbar"></div>
            
            <div class="grid grid-cols-4 gap-1.5 py-2">
                <div class="ios-card p-2 text-center"><p class="text-[8px] font-bold text-gray-400 uppercase">Días</p><p id="stat-days" class="text-sm font-bold">0</p></div>
                <div class="ios-card p-2 text-center"><p class="text-[8px] font-bold text-gray-400 uppercase">Dif. Mes</p><p id="stat-real" class="text-sm font-bold">0:00</p></div>
                <div class="ios-card p-2 text-center bg-indigo-50/50"><p class="text-[8px] font-bold text-indigo-600 uppercase">Noc.</p><p id="stat-noc" class="text-sm font-bold text-indigo-700">0:00</p></div>
                <div class="ios-card p-2 text-center bg-green-50"><p class="text-[8px] font-bold text-green-700 uppercase">Extra+Noc</p><p id="stat-extra" class="text-sm font-bold text-green-700">0:00</p></div>
            </div>

            <div class="ios-card rounded-b-none border-b-0 shadow-none">
                <table>
                    <thead>
                        <tr>
                            <th class="col-dia">Día</th>
                            <th class="col-tipo">Tipo</th>
                            <th class="col-data">Ent.</th>
                            <th class="col-data">Sal.</th>
                            <th class="col-res text-blue-600">Real</th>
                            <th class="col-res">Dif.</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>

        <div class="px-3 pt-1">
            <div class="ios-card rounded-t-none border-t-0 mb-4">
                <table id="main-table">
                    <colgroup>
                        <col class="col-dia"><col class="col-tipo"><col class="col-data"><col class="col-data"><col class="col-res"><col class="col-res">
                    </colgroup>
                    <tbody id="table-body" class="text-sm"></tbody>
                </table>
            </div>

            <div class="ios-card p-4 bg-[#1c1c1e] text-white flex justify-between items-center mb-6">
                <p class="text-[10px] font-bold uppercase opacity-60">Saldo Anual Total</p>
                <span id="stat-total" class="text-xl font-bold font-mono">00:00</span>
            </div>

            <div class="flex flex-col gap-2 mb-10">
                <button onclick="exportToCSV()" class="w-full bg-white border border-gray-200 p-4 rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-sm">Exportar a Excel</button>
                <div class="flex gap-2">
                    <button onclick="downloadJSON()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Copia Seguridad</button>
                    <button onclick="document.getElementById('file-input').click()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Restaurar</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" accept=".json">

    <script>
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const daysShort = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];
        const holidays = {"1-1":1, "1-6":1, "5-1":1, "8-15":1, "10-12":1, "11-1":1, "12-6":1, "12-8":1, "12-25":1};
        
        // --- LÓGICA DE DATOS Y MIGRACIÓN ---
        let currentYear = Math.max(2026, new Date().getFullYear());
        let currentMonthIdx = new Date().getMonth();
        let data = JSON.parse(localStorage.getItem('horas_multiy_v2')) || {};

        // Si v2 está vacío, intentamos recuperar de v1
        if (Object.keys(data).length === 0) {
            const oldData = JSON.parse(localStorage.getItem('horas_multiy_v1'));
            if (oldData) {
                // Adaptamos el formato antiguo al nuevo (C = Continuo por defecto)
                Object.keys(oldData).forEach(key => {
                    const d = oldData[key];
                    data[key] = {
                        t: 'C',
                        i1: d.in || '',
                        o1: d.out || '',
                        i2: '',
                        o2: '',
                        obj: d.obj || '07:36',
                        note: d.note || ''
                    };
                });
                localStorage.setItem('horas_multiy_v2', JSON.stringify(data));
                console.log("Migración completada.");
            }
        }
        // -----------------------------------

        let activeKey = null;

        function initYearSelector() {
            const sel = document.getElementById('year-selector');
            sel.innerHTML = "";
            for(let y=2026; y<=2030; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.innerText = y;
                if(y === currentYear) opt.selected = true;
                sel.appendChild(opt);
            }
        }

        function tToD(t) {
            if(!t) return 0;
            let clean = t.replace('.', ':').trim();
            if(!clean.includes(':')) {
                if(clean.length <= 2) clean += ":00";
                else clean = clean.slice(0,-2) + ":" + clean.slice(-2);
            }
            const [h, m] = clean.split(':').map(Number);
            return (h || 0) + ((m || 0)/60);
        }

        function dToC(n) {
            const s = n < -0.001 ? '-' : '';
            const a = Math.abs(n);
            const h = Math.floor(a);
            const m = Math.round((a - h) * 60);
            return `${s}${h}:${m.toString().padStart(2, '0')}`;
        }

        function calcNoc(s, e) {
            if(!s || !e) return 0;
            let start = tToD(s), end = tToD(e), noc = 0;
            if(end < start) end += 24;
            for(let h = start; h < end; h += 0.25) {
                let hour = h % 24;
                if(hour >= 22 || hour < 6) noc += 0.25;
            }
            return noc * 0.25; 
        }

        function renderTable(shouldScroll = false) {
            const body = document.getElementById('table-body'); body.innerHTML = "";
            const daysCount = new Date(currentYear, currentMonthIdx + 1, 0).getDate();
            const today = new Date();
            const todayKey = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            
            let mReal = 0, mNoc = 0, mDays = 0;

            for(let d = 1; d <= daysCount; d++) {
                const date = new Date(currentYear, currentMonthIdx, d);
                const key = `${currentYear}-${currentMonthIdx + 1}-${d}`;
                const dD = data[key] || { t: 'C', i1:'', o1:'', i2:'', o2:'', obj:'07:36', note:'' };
                const isWE = date.getDay() === 0 || date.getDay() === 6;
                const isHol = holidays[`${currentMonthIdx+1}-${d}`];

                let worked = 0, noc = 0;
                if(dD.i1 && dD.o1) {
                    let w1 = tToD(dD.o1) - tToD(dD.i1); if(w1 < 0) w1 += 24;
                    worked += w1; noc += calcNoc(dD.i1, dD.o1);
                }
                if(dD.t === 'P' && dD.i2 && dD.o2) {
                    let w2 = tToD(dD.o2) - tToD(dD.i2); if(w2 < 0) w2 += 24;
                    worked += w2; noc += calcNoc(dD.i2, dD.o2);
                }

                const diff = worked > 0 ? worked - tToD(dD.obj || '07:36') : 0;
                if(worked > 0) { mDays++; mReal += diff; mNoc += noc; }

                const row = document.createElement('tr');
                if(key === todayKey) { row.className = "today-row"; row.id = "scroll-target"; }
                else if(isWE || isHol) row.className = "weekend";

                row.innerHTML = `
                    <td class="col-dia ${dD.note ? 'has-note' : ''}" onclick="openNote('${key}', ${d})">
                        <div class="text-[8px] font-bold ${isWE || isHol ? 'holiday-text' : 'text-gray-400'}">${daysShort[date.getDay()]}</div>
                        <div class="text-xs font-bold">${d}</div>
                    </td>
                    <td class="col-tipo">
                        <select onchange="upd('${key}','t',this.value)">
                            <option value="C" ${dD.t==='C'?'selected':''}>C</option>
                            <option value="P" ${dD.t==='P'?'selected':''}>P</option>
                        </select>
                    </td>
                    <td class="col-data">
                        <input type="text" inputmode="decimal" value="${dD.i1||''}" onblur="upd('${key}','i1',this.value)" placeholder="--.--">
                        ${dD.t === 'P' ? `<input type="text" inputmode="decimal" value="${dD.i2||''}" onblur="upd('${key}','i2',this.value)" class="border-t border-gray-100 mt-1">` : ''}
                    </td>
                    <td class="col-data">
                        <input type="text" inputmode="decimal" value="${dD.o1||''}" onblur="upd('${key}','o1',this.value)" placeholder="--.--">
                        ${dD.t === 'P' ? `<input type="text" inputmode="decimal" value="${dD.o2||''}" onblur="upd('${key}','o2',this.value)" class="border-t border-gray-100 mt-1">` : ''}
                    </td>
                    <td class="col-res font-semibold text-blue-600">${worked > 0 ? dToC(worked) : '-'}</td>
                    <td class="col-res font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-500'}">${worked > 0 ? (diff>=0?'+':'')+dToC(diff) : ''}</td>
                `;
                body.appendChild(row);
            }
            updateStats(mDays, mReal, mNoc);
            if(shouldScroll && currentMonthIdx === today.getMonth() && currentYear === today.getFullYear()) {
                setTimeout(() => document.getElementById('scroll-target')?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
            }
        }

        function upd(k, f, v) {
            if(!data[k]) data[k] = { t: 'C', i1:'', o1:'', i2:'', o2:'', obj:'07:36', note:'' };
            if(data[k][f] !== v) {
                data[k][f] = v;
                localStorage.setItem('horas_multiy_v2', JSON.stringify(data));
                renderTable(false);
            }
        }

        function updateStats(d, r, n) {
            document.getElementById('stat-days').innerText = d;
            document.getElementById('stat-real').innerText = (r >= 0 ? '+' : '') + dToC(r);
            document.getElementById('stat-noc').innerText = dToC(n);
            let extraConNoc = (r * 1.5) + n;
            document.getElementById('stat-extra').innerText = (extraConNoc >= 0 ? '+' : '') + dToC(extraConNoc);
            
            let total = 0;
            Object.keys(data).forEach(k => {
                if(k.startsWith(currentYear)) {
                    let day = data[k], worked = 0, nocDay = 0;
                    let w1 = tToD(day.o1) - tToD(day.i1); if(w1 < 0) w1 += 24; worked += w1;
                    nocDay += calcNoc(day.i1, day.o1);
                    if(day.t === 'P') { 
                        let w2 = tToD(day.o2) - tToD(day.i2); if(w2 < 0) w2 += 24; worked += w2; 
                        nocDay += calcNoc(day.i2, day.o2);
                    }
                    if(worked > 0) total += ((worked - tToD(day.obj || '07:36')) * 1.5) + nocDay;
                }
            });
            document.getElementById('stat-total').innerText = dToC(total);
        }

        function downloadJSON() {
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `backup_horas_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }

        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if(confirm("¿Restaurar copia? Se sobrescribirán los datos actuales.")) {
                        data = imported;
                        localStorage.setItem('horas_multiy_v2', JSON.stringify(data));
                        renderTable(true);
                    }
                } catch(err) { alert("Archivo no válido"); }
            };
            reader.readAsText(e.target.files[0]);
        };

        function exportToCSV() {
            let csv = "\uFEFFFecha;Tipo;Entrada 1;Salida 1;Entrada 2;Salida 2;Total;Objetivo;Nota\n";
            Object.keys(data).sort().forEach(k => {
                const d = data[k];
                let w = (tToD(d.o1)-tToD(d.i1)) + (d.t==='P'?(tToD(d.o2)-tToD(d.i2)):0);
                csv += `${k};${d.t};${d.i1};${d.o1};${d.i2||''};${d.o2||''};${dToC(w)};${d.obj};"${d.note||''}"\n`;
            });
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            a.download = `registro_${currentYear}.csv`; a.click();
        }

        function openNote(k, d) { activeKey = k; document.getElementById('modal-date').innerText = d + " " + months[currentMonthIdx]; document.getElementById('modal-text').value = data[k]?.note || ""; document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function saveNote() { upd(activeKey, 'note', document.getElementById('modal-text').value); closeModal(); }
        function changeMonth(i) { currentMonthIdx = i; renderTabs(); renderTable(true); }
        function changeYear(y) { currentYear = parseInt(y); renderTable(true); }
        function renderTabs() {
            document.getElementById('month-tabs').innerHTML = months.map((m, i) => `<button onclick="changeMonth(${i})" class="flex-none px-4 py-2 rounded-full text-[10px] font-bold ${i === currentMonthIdx ? 'bg-black text-white' : 'bg-white text-gray-400 border border-gray-100'}">${m.toUpperCase()}</button>`).join('');
        }

        window.onload = () => { initYearSelector(); renderTabs(); renderTable(true); };
    </script>
</body>
</html>
