<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Registro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--ios-bg); -webkit-font-smoothing: antialiased; margin: 0; }
        
        /* BLOQUE FIJO SUPERIOR */
        .header-sticky {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--ios-bg);
            padding-top: env(safe-area-inset-top);
        }

        .ios-card { background: white; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* TABLA Y COLUMNAS */
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th { background: #f9f9f9; color: #666; font-size: 10px; text-transform: uppercase; padding: 12px 0; border-bottom: 1px solid #eee; }
        td { height: 50px; border-bottom: 1px solid #f2f2f2; text-align: center; vertical-align: middle; }
        
        .col-dia { width: 60px; }
        .col-hora { width: 55px; }
        .col-real { width: 50px; }
        .col-obj { width: 45px; }
        .col-dif { width: 60px; }

        input { width: 100%; border: none; background: transparent; text-align: center; font-size: 15px; color: #333; outline: none; padding: 10px 0; }
        input:focus { background: #eef6ff; color: #2563eb; }

        .weekend { background-color: #fafafa; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-md mx-auto">
        <div class="header-sticky px-3 shadow-sm">
            <div class="flex justify-between items-center pt-4 pb-2">
                <h1 class="text-2xl font-bold">Registro 2026</h1>
                <button id="btn-view" class="bg-blue-600 text-white text-[10px] px-4 py-2 rounded-full font-bold uppercase">Resumen</button>
            </div>

            <div id="month-tabs" class="flex overflow-x-auto gap-2 py-2 no-scrollbar"></div>

            <div id="quick-stats" class="grid grid-cols-3 gap-2 py-2">
                <div class="ios-card p-2 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Días</p>
                    <p id="stat-days" class="text-lg font-bold">0</p>
                </div>
                <div class="ios-card p-2 text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase">Real (1x)</p>
                    <p id="stat-real" class="text-lg font-bold text-gray-600">0h</p>
                </div>
                <div class="ios-card p-2 text-center bg-green-50 border border-green-100">
                    <p class="text-[8px] font-bold text-green-700 uppercase">Extra (1.5x)</p>
                    <p id="stat-extra" class="text-lg font-bold text-green-700">0h</p>
                </div>
            </div>

            <div class="ios-card rounded-b-none border-b-0">
                <table>
                    <thead>
                        <tr>
                            <th class="col-dia">Día</th>
                            <th class="col-hora">Ent.</th>
                            <th class="col-hora">Sal.</th>
                            <th class="col-real text-blue-600">Real</th>
                            <th class="col-obj">Obj.</th>
                            <th class="col-dif">Dif.</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>

        <div id="view-main" class="px-3">
            <div class="ios-card rounded-t-none border-t-0 mb-4">
                <table id="main-table">
                    <colgroup>
                        <col class="col-dia"><col class="col-hora"><col class="col-hora">
                        <col class="col-real"><col class="col-obj"><col class="col-dif">
                    </colgroup>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div class="ios-card p-4 bg-gray-900 text-white flex justify-between items-center mb-6">
                <span class="text-xs font-bold uppercase opacity-60">Saldo Total Año</span>
                <span id="stat-total" class="text-xl font-bold">0h 0m</span>
            </div>

            <div class="flex gap-2 mb-10">
                <button id="btn-download" class="flex-1 bg-white border p-3 rounded-xl text-[10px] font-bold uppercase">Guardar Backup</button>
                <button id="btn-import" class="flex-1 bg-white border p-3 rounded-xl text-[10px] font-bold uppercase">Cargar Backup</button>
            </div>
        </div>

        <div id="view-summary" class="px-3 hidden">
            <div class="ios-card">
                <table class="text-sm">
                    <thead><tr><th class="p-4 text-left">Mes</th><th>Días</th><th class="p-4 text-right">Extra (1.5x)</th></tr></thead>
                    <tbody id="summary-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" accept=".json">

    <script>
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const daysShort = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];
        let currentMonthIdx = new Date().getMonth();
        let data = JSON.parse(localStorage.getItem('horas_2026_v4')) || {};

        // FORMATEADOR DE TECLADO: Convierte "8.30" en "08:30"
        function formatTime(val) {
            if(!val) return "";
            let clean = val.replace(/[^0-9:.,]/g, '').replace(/[.,]/g, ':');
            if(!clean.includes(':')) {
                if(clean.length <= 2) clean += ":00";
                else clean = clean.slice(0,-2) + ":" + clean.slice(-2);
            }
            let [h, m] = clean.split(':');
            return `${h.padStart(2, '0')}:${(m || '00').padEnd(2, '0').slice(0,2)}`;
        }

        function timeToDec(t) {
            if(!t || !t.includes(':')) return 0;
            const [h, m] = t.split(':').map(Number);
            return h + (m/60);
        }

        function decToTime(n) {
            const sign = n < 0 ? '-' : '';
            const abs = Math.abs(n);
            const h = Math.floor(abs);
            const m = Math.round((abs - h) * 60);
            return `${sign}${h}h ${m.toString().padStart(2, '0')}m`;
        }

        function renderTabs() {
            const container = document.getElementById('month-tabs');
            container.innerHTML = months.map((m, i) => `
                <button onclick="changeMonth(${i})" class="flex-none px-5 py-2 rounded-full text-[11px] font-bold ${i === currentMonthIdx ? 'bg-black text-white' : 'bg-white text-gray-400 border'}">
                    ${m.substring(0,3).toUpperCase()}
                </button>
            `).join('');
        }

        function changeMonth(i) { currentMonthIdx = i; renderTabs(); renderTable(); }

        function renderTable() {
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            const year = 2026;
            const daysInMonth = new Date(year, currentMonthIdx + 1, 0).getDate();
            
            let mReal = 0, mExtra = 0, mDays = 0;

            for(let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, currentMonthIdx, d);
                const key = `${year}-${currentMonthIdx + 1}-${d}`;
                const dayData = data[key] || { in: '', out: '', obj: '7.6' };
                const isWE = date.getDay() === 0 || date.getDay() === 6;
                
                let worked = 0, diff = 0;
                if(dayData.in && dayData.out) {
                    worked = timeToDec(dayData.out) - timeToDec(dayData.in);
                    if(worked < 0) worked += 24;
                    diff = worked - parseFloat(dayData.obj || 0);
                    mDays++; mReal += diff; mExtra += (diff * 1.5);
                }

                const row = document.createElement('tr');
                if(isWE) row.className = "weekend";
                row.innerHTML = `
                    <td class="col-dia">
                        <div class="text-[9px] font-bold ${isWE ? 'text-red-400' : 'text-gray-400'}">${daysShort[date.getDay()]}</div>
                        <div class="text-sm font-bold">${d}</div>
                    </td>
                    <td class="col-hora"><input type="text" inputmode="decimal" value="${dayData.in}" onblur="update('${key}','in',this.value)" placeholder="--:--"></td>
                    <td class="col-hora"><input type="text" inputmode="decimal" value="${dayData.out}" onblur="update('${key}','out',this.value)" placeholder="--:--"></td>
                    <td class="col-real font-bold text-blue-600 text-xs">${worked > 0 ? worked.toFixed(2) : '-'}</td>
                    <td class="col-obj"><input type="text" inputmode="decimal" value="${dayData.obj}" onblur="update('${key}','obj',this.value)"></td>
                    <td class="col-dif text-xs font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-500'}">${worked > 0 ? (diff > 0 ? '+' : '') + diff.toFixed(2) : ''}</td>
                `;
                body.appendChild(row);
            }
            updateStats(mDays, mReal, mExtra);
        }

        function update(key, field, val) {
            if(!data[key]) data[key] = { in: '', out: '', obj: '7.6' };
            data[key][field] = (field === 'in' || field === 'out') ? formatTime(val) : val;
            localStorage.setItem('horas_2026_v4', JSON.stringify(data));
            renderTable();
        }

        function updateStats(d, r, e) {
            document.getElementById('stat-days').innerText = d;
            document.getElementById('stat-real').innerText = decToTime(r);
            document.getElementById('stat-extra').innerText = decToTime(e);
            
            let total = 0;
            Object.keys(data).forEach(k => {
                const day = data[k];
                if(day.in && day.out) {
                    let w = timeToDec(day.out) - timeToDec(day.in);
                    if(w < 0) w += 24;
                    total += (w - parseFloat(day.obj || 0)) * 1.5;
                }
            });
            document.getElementById('stat-total').innerText = decToTime(total);
        }

        // Vistas
        document.getElementById('btn-view').onclick = function() {
            const main = document.getElementById('view-main');
            const summ = document.getElementById('view-summary');
            const isMain = summ.classList.toggle('hidden');
            main.classList.toggle('hidden');
            this.innerText = isMain ? "Resumen" : "Volver";
            if(!isMain) renderAnnual();
        };

        function renderAnnual() {
            const body = document.getElementById('summary-body');
            body.innerHTML = months.map((m, i) => {
                let md = 0, me = 0;
                Object.keys(data).forEach(k => {
                    if(k.split('-')[1] == i+1) {
                        const day = data[k];
                        if(day.in && day.out) {
                            let w = timeToDec(day.out) - timeToDec(day.in);
                            if(w < 0) w += 24;
                            md++; me += (w - parseFloat(day.obj || 0)) * 1.5;
                        }
                    }
                });
                return `<tr><td class="p-4 font-bold">${m}</td><td class="text-center">${md}</td><td class="p-4 text-right font-bold ${me >= 0 ? 'text-green-600' : 'text-red-500'}">${decToTime(me)}</td></tr>`;
            }).join('');
        }

        // Backup
        document.getElementById('btn-download').onclick = () => {
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `horas_2026_backup.json`; a.click();
        };

        document.getElementById('btn-import').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { data = JSON.parse(ev.target.result); localStorage.setItem('horas_2026_v4', JSON.stringify(data)); renderTable(); };
            reader.readAsText(e.target.files[0]);
        };

        window.onload = () => { renderTabs(); renderTable(); };
    </script>
</body>
</html>
