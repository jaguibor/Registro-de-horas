<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Registro">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/109/109613.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/109/109613.png">
    <link rel="manifest" href="manifest.json?v=8">
    
    <title>Registro de Horas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--ios-bg); margin: 0; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }
        .header-sticky { position: sticky; top: 0; z-index: 100; background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding-top: env(safe-area-inset-top); border-bottom: 0.5px solid #d1d1d6; }
        .ios-card { background: white; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); overflow: hidden; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th { background: #fbfbfd; color: #8e8e93; font-size: 9px; text-transform: uppercase; padding: 12px 0; text-align: center; font-weight: 700; border-bottom: 0.5px solid #e5e5ea; }
        td { height: 55px; border-bottom: 0.5px solid #e5e5ea; text-align: center; vertical-align: middle; position: relative; }
        input, select { width: 100%; border: none; background: transparent; text-align: center; font-size: 15px; outline: none; padding: 5px 0; font-variant-numeric: tabular-nums; color: inherit; }
        .col-dia { width: 15%; } .col-data { width: 17%; }
        .weekend { background-color: #f9f9fb; }
        .holiday-text { color: #ff3b30 !important; font-weight: bold; }
        .today-row { background-color: #fff9c4 !important; }
        .has-note::after { content: ''; position: absolute; top: 6px; right: 6px; width: 5px; height: 5px; background: #007aff; border-radius: 50%; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .year-select { background: #e5e5ea; border-radius: 8px; padding: 2px 8px; font-size: 14px; font-weight: bold; width: auto; appearance: none; }
    </style>
</head>
<body class="pb-20">

    <div id="modal-overlay" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl scale-up">
            <h3 id="modal-date" class="text-lg font-bold mb-4 text-center"></h3>
            <textarea id="modal-text" class="w-full h-32 p-3 border border-gray-100 rounded-xl bg-gray-50 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Escribe una nota..."></textarea>
            <div class="flex gap-3 mt-5">
                <button onclick="closeModal()" class="flex-1 p-3 text-sm font-bold text-gray-400">Cerrar</button>
                <button onclick="saveNote()" class="flex-1 p-3 text-sm font-bold bg-black text-white rounded-xl">Guardar</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <div class="header-sticky px-3">
            <div class="flex justify-between items-center pt-5 pb-2">
                <h1 class="text-xl font-bold tracking-tight">Registro</h1>
                <select id="year-selector" class="year-select" onchange="changeYear(this.value)"></select>
            </div>
            <div id="month-tabs" class="flex overflow-x-auto gap-2 py-2 no-scrollbar"></div>
            <div class="grid grid-cols-4 gap-1.5 py-2">
                <div class="ios-card p-2 text-center"><p class="text-[8px] font-bold text-gray-400 uppercase">Días</p><p id="stat-days" class="text-sm font-bold">0</p></div>
                <div class="ios-card p-2 text-center"><p class="text-[8px] font-bold text-gray-400 uppercase">Dif. Mes</p><p id="stat-real" class="text-sm font-bold">0:00</p></div>
                <div class="ios-card p-2 text-center bg-indigo-50/50"><p class="text-[8px] font-bold text-indigo-600 uppercase">Nocturnas</p><p id="stat-noc" class="text-sm font-bold text-indigo-700">0:00</p></div>
                <div class="ios-card p-2 text-center bg-green-50"><p class="text-[8px] font-bold text-green-700 uppercase">Extra + Noc</p><p id="stat-extra" class="text-sm font-bold text-green-700">0:00</p></div>
            </div>
            <div class="ios-card rounded-b-none border-b-0 shadow-none">
                <table>
                    <thead>
                        <tr><th class="col-dia">Día</th><th class="col-data">Ent.</th><th class="col-data">Sal.</th><th class="col-data text-blue-600">Real</th><th class="col-data">Obj.</th><th class="col-data">Dif.</th></tr>
                    </thead>
                </table>
            </div>
        </div>

        <div class="px-3 pt-1">
            <div class="ios-card rounded-t-none border-t-0 mb-4">
                <table id="main-table">
                    <colgroup><col class="col-dia"><col class="col-data"><col class="col-data"><col class="col-data"><col class="col-data"><col class="col-data"></colgroup>
                    <tbody id="table-body" class="text-sm"></tbody>
                </table>
            </div>
            <div class="ios-card p-4 bg-[#1c1c1e] text-white flex justify-between items-center mb-6">
                <p class="text-[10px] font-bold uppercase opacity-60">Saldo Anual Total</p>
                <span id="stat-total" class="text-xl font-bold font-mono">00:00</span>
            </div>
            <div class="flex flex-col gap-2 mb-10">
                <button onclick="exportToCSV()" class="w-full bg-white border border-gray-200 p-4 rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-sm">Exportar a Excel</button>
                <div class="flex gap-2">
                    <button onclick="downloadJSON()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Copia Seguridad</button>
                    <button onclick="document.getElementById('file-input').click()" class="flex-1 bg-gray-200/50 p-3 rounded-xl text-[9px] font-bold uppercase text-gray-600">Restaurar</button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" class="hidden" accept=".json">

    <script>
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const daysShort = ["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"];
        const holidays = {"1-1":1, "1-6":1, "5-1":1, "8-15":1, "10-12":1, "11-1":1, "12-6":1, "12-8":1, "12-25":1};
        
        let currentYear = Math.max(2026, new Date().getFullYear());
        let currentMonthIdx = new Date().getMonth();
        let data = JSON.parse(localStorage.getItem('horas_multiy_v1')) || {};
        let activeKey = null;

        function initYearSelector() {
            const sel = document.getElementById('year-selector');
            for(let y=2026; y<=2030; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.innerText = y;
                if(y === currentYear) opt.selected = true;
                sel.appendChild(opt);
            }
        }

        function formatTime(val) {
            if(!val) return "";
            let clean = val.replace('.', ':');
            if(!clean.includes(':')) { if(clean.length <= 2) clean += ":00"; else clean = clean.slice(0,-2) + ":" + clean.slice(-2); }
            let [h, m] = clean.split(':');
            return `${h.padStart(2, '0')}:${(m || '00').padEnd(2, '0').slice(0,2)}`;
        }

        function tToD(t) { if(!t || !t.includes(':')) return 0; const [h, m] = t.split(':').map(Number); return h + (m/60); }
        function dToC(n) { const s = n < -0.001 ? '-' : ''; const a = Math.abs(n); const h = Math.floor(a); const m = Math.round((a - h) * 60); return `${s}${h}:${m.toString().padStart(2, '0')}`; }

        function calcNightly(start, end) {
            if(!start || !end) return 0;
            let s = tToD(start), e = tToD(end);
            if(e < s) e += 24; 
            let nightlyHours = 0;
            for(let h = s; h < e; h += 0.25) {
                let hourOfDay = h % 24;
                if(hourOfDay >= 22 || hourOfDay < 6) nightlyHours += 0.25;
            }
            return nightlyHours * 0.25; 
        }

        function renderTable() {
            const body = document.getElementById('table-body'); body.innerHTML = "";
            const daysInMonth = new Date(currentYear, currentMonthIdx + 1, 0).getDate();
            const today = new Date();
            const todayKey = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
            
            let mReal = 0, mNoc = 0, mDays = 0;

            for(let d = 1; d <= daysInMonth; d++) {
                const date = new Date(currentYear, currentMonthIdx, d);
                const key = `${currentYear}-${currentMonthIdx + 1}-${d}`;
                const dD = data[key] || { in: '', out: '', obj: '07:36', note: '' };
                const isWE = date.getDay() === 0 || date.getDay() === 6;
                const isHoliday = holidays[`${currentMonthIdx + 1}-${d}`];

                let worked = 0, diff = 0, noc = 0;
                if(dD.in && dD.out) {
                    worked = tToD(dD.out) - tToD(dD.in); if(worked < 0) worked += 24;
                    diff = worked - tToD(dD.obj || '07:36');
                    noc = calcNightly(dD.in, dD.out);
                    mDays++; mReal += diff; mNoc += noc;
                }

                const row = document.createElement('tr');
                if(key === todayKey) { row.className = "today-row"; row.id = "scroll-target"; }
                else if(isWE || isHoliday) row.className = "weekend";

                row.innerHTML = `
                    <td class="col-dia ${dD.note ? 'has-note' : ''}" onclick="openNote('${key}', ${d})">
                        <div class="text-[8px] font-bold ${isWE || isHoliday ? 'holiday-text' : 'text-gray-400'}">${daysShort[date.getDay()]}</div>
                        <div class="text-xs font-bold">${d}</div>
                    </td>
                    <td class="col-data"><input type="text" inputmode="decimal" value="${dD.in||''}" onblur="upd('${key}','in',this.value)" placeholder="--:--"></td>
                    <td class="col-data"><input type="text" inputmode="decimal" value="${dD.out||''}" onblur="upd('${key}','out',this.value)" placeholder="--:--"></td>
                    <td class="col-data font-semibold text-blue-600">${worked > 0 ? dToC(worked) : '-'}</td>
                    <td class="col-data"><input type="text" inputmode="decimal" value="${dD.obj||'07:36'}" onblur="upd('${key}','obj',this.value)"></td>
                    <td class="col-data font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-500'}">${worked > 0 ? (diff > 0 ? '+' : '') + dToC(diff) : ''}</td>
                `;
                body.appendChild(row);
            }
            updateStats(mDays, mReal, mNoc);
            if(currentMonthIdx === today.getMonth() && currentYear === today.getFullYear()) {
                setTimeout(() => document.getElementById('scroll-target')?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
            }
        }

        function openNote(key, d) {
            activeKey = key;
            document.getElementById('modal-date').innerText = `${d} de ${months[currentMonthIdx]} ${currentYear}`;
            document.getElementById('modal-text').value = data[key]?.note || "";
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function saveNote() {
            if(!data[activeKey]) data[activeKey] = { in: '', out: '', obj: '07:36', note: '' };
            data[activeKey].note = document.getElementById('modal-text').value;
            localStorage.setItem('horas_multiy_v1', JSON.stringify(data));
            closeModal(); renderTable();
        }

        function upd(k, f, v) {
            if(!data[k]) data[k] = { in: '', out: '', obj: '07:36', note: '' };
            data[k][f] = v ? formatTime(v) : (f === 'obj' ? '07:36' : '');
            localStorage.setItem('horas_multiy_v1', JSON.stringify(data));
            renderTable();
        }

        function updateStats(d, r, n) {
            document.getElementById('stat-days').innerText = d;
            document.getElementById('stat-real').innerText = (r >= 0 ? '+' : '') + dToC(r);
            document.getElementById('stat-noc').innerText = dToC(n);
            let extraConNoc = (r * 1.5) + n;
            document.getElementById('stat-extra').innerText = (extraConNoc >= 0 ? '+' : '') + dToC(extraConNoc);
            
            let totalAnual = 0;
            Object.keys(data).forEach(key => {
                if(key.startsWith(currentYear)) {
                    const day = data[key];
                    if(day.in && day.out) {
                        let w = tToD(day.out) - tToD(day.in); if(w < 0) w += 24;
                        let dif = w - tToD(day.obj || '07:36');
                        let nc = calcNightly(day.in, day.out);
                        totalAnual += (dif * 1.5) + nc;
                    }
                }
            });
            document.getElementById('stat-total').innerText = dToC(totalAnual);
        }

        function changeMonth(i) { currentMonthIdx = i; renderTabs(); renderTable(); }
        function changeYear(y) { currentYear = parseInt(y); renderTable(); }

        function renderTabs() {
            document.getElementById('month-tabs').innerHTML = months.map((m, i) => `
                <button onclick="changeMonth(${i})" class="flex-none px-4 py-2 rounded-full text-[10px] font-bold ${i === currentMonthIdx ? 'bg-black text-white' : 'bg-white text-gray-400 border border-gray-100'}">
                    ${m.toUpperCase()}
                </button>
            `).join('');
        }

        function exportToCSV() {
            let csv = "\uFEFFFecha;Entrada;Salida;Real;Objetivo;Diferencia;Nota\n";
            Object.keys(data).sort().forEach(k => {
                const d = data[k]; if(d.in) {
                    let w = tToD(d.out) - tToD(d.in); if(w < 0) w += 24;
                    csv += `${k};${d.in};${d.out};${dToC(w)};${d.obj};${dToC(w-tToD(d.obj))};"${d.note||''}"\n`;
                }
            });
            const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = `registro_${currentYear}.csv`; a.click();
        }

        function downloadJSON() {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: 'application/json'})); a.download = "backup.json"; a.click();
        }

        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { data = JSON.parse(ev.target.result); localStorage.setItem('horas_multiy_v1', JSON.stringify(data)); renderTable(); };
            reader.readAsText(e.target.files[0]);
        };

        window.onload = () => { initYearSelector(); renderTabs(); renderTable(); };
    </script>
</body>
</html>
